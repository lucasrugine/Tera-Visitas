/* ── VERSÃO CELULAR (adaptação automática até 760px) ── */
@media (max-width:760px){

  aside{width:100% !important;height:auto !important;position:static !important;overflow:visible !important}
  aside>div:first-child{display:none !important}
  aside nav{display:flex !important;flex-direction:row !important;flex-wrap:nowrap !important;overflow-x:auto !important;padding:8px !important;gap:2px}
  aside nav>div{flex-shrink:0 !important;margin-bottom:0 !important;white-space:nowrap}
  aside nav>div[style*="uppercase"]{display:none !important}
  main>div:first-child{flex-wrap:wrap !important;gap:8px !important;padding:10px 12px !important}
  main>div:last-child{padding:12px 10px !important}
  div[style*="repeat(4,1fr)"],div[style*="repeat(4, 1fr)"]{grid-template-columns:repeat(2,1fr) !important}
  div[style*="repeat(3,1fr)"],div[style*="repeat(3, 1fr)"]{grid-template-columns:repeat(2,1fr) !important}
  div[style*="grid-template-columns: 1fr 1fr"]{grid-template-columns:1fr !important}
  table{display:block;overflow-x:auto;white-space:nowrap}
}
</style>

function calcDias(de,ate){if(!de||!ate)return 5;return Math.max(1,Math.round((new Date(ate)-new Date(de))/(864e5))+1);}
function fmtDt(d){return d?new Date(d).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"-";}
function parseVisitaDate(s){
  if(s==null||s==="") return null;
  if(s instanceof Date) return isNaN(s.getTime())?null:s;
  s=String(s).trim();
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3],12,0,0);
  var p=s.split("/");
  if(p.length>=3) return new Date(+p[2],+p[1]-1,+p[0],12,0,0);
  var d=new Date(s); return isNaN(d.getTime())?null:d;
}
function fmtVisitaData(s){var d=parseVisitaDate(s);return d?("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2):"-";}
function fmtVisitaHora(s){
  if(s==null||s==="") return "";
  if(/^\d{1,2}:\d{2}/.test(String(s))) return String(s).slice(0,5);
  var d=new Date(s); if(isNaN(d.getTime())) return String(s);
  return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});
}
function getData(de,ate){ return null; } // substituído por useApiData

function useApiData(de,ate,rep){
  var [data,setData]=useState(null);
  var [loading,setLoading]=useState(true);
  var [error,setError]=useState(null);
  var [visitas,setVisitas]=useState([]);

  useEffect(()=>{
    if(!de||!ate){ setLoading(false); return; }
    setLoading(true); setError(null);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getVisitas",representante:rep||""})})
      .then(r=>r.json())
      .then(res=>{
        if(!res.ok) throw new Error(res.error||"Erro API");
        var rows=Array.isArray(res.data)?res.data:[];
        // Filtrar por período
        var deDt=new Date(de+"T00:00:00"), ateDt=new Date(ate+"T23:59:59");
        var filtradas=rows.filter(v=>{
          var dt=parseVisitaDate(v.Data);
          if(!dt) return false;
          return dt>=deDt && dt<=ateDt;
        });
        setVisitas(filtradas);

        // Calcular KPIs
        var hojeRef=new Date();
        var kpis={
          total:filtradas.length,
          hoje:filtradas.filter(v=>{var hd=parseVisitaDate(v.Data);return hd&&hd.getFullYear()===hojeRef.getFullYear()&&hd.getMonth()===hojeRef.getMonth()&&hd.getDate()===hojeRef.getDate();}).length,
          pres:filtradas.filter(v=>v.Tipo_Atendimento!=="Remoto").length,
          rem:filtradas.filter(v=>v.Tipo_Atendimento==="Remoto").length,
          valor:filtradas.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),
          fech:filtradas.filter(v=>v.Status_Negocio==="Venda realizada").length,
          prop:filtradas.filter(v=>v.Status_Negocio==="Em negociação").length,
          porTipo:{},
          porRep:{},
          porTipoRep:{},
        };
        filtradas.forEach(v=>{
          var t=v.Tipo_Visita||"Outro";
          kpis.porTipo[t]=(kpis.porTipo[t]||0)+1;
          var r=v.Representante||"?";
          kpis.porRep[r]=(kpis.porRep[r]||0)+1;
          if(!kpis.porTipoRep[t]) kpis.porTipoRep[t]={};
          kpis.porTipoRep[t][r]=(kpis.porTipoRep[t][r]||0)+1;
        });
        setData(kpis);
        setLoading(false);
      })
      .catch(e=>{ setError(e.message); setLoading(false); });
  },[de,ate,rep]);

  return {data,loading,error,visitas};
}

function Donut({data,colors,size=150,lbl="visitas"}){
  var entries=Object.entries(data),total=entries.reduce((a,[,v])=>a+v,0),denom=total||1;
  var angle=-Math.PI/2,r=size*.36,inner=size*.22,cx=size/2,cy=size/2;
  var slices=entries.map(([l,v],i)=>{
    var sw=v/denom*2*Math.PI;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sw;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var lf=sw>Math.PI?1:0;
    var xi1=cx+inner*Math.cos(angle-sw),yi1=cy+inner*Math.sin(angle-sw);
    var xi2=cx+inner*Math.cos(angle),yi2=cy+inner*Math.sin(angle);
    return {l,v,c:colors[i%colors.length],x1,y1,x2,y2,xi1,yi1,xi2,yi2,lf};
  });
  return <div style={{display:"flex",alignItems:"center",gap:12}}>
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,flexShrink:0}}>
      {slices.map((s,i)=><path key={i} d={`M${s.x1} ${s.y1}A${r} ${r} 0 ${s.lf} 1 ${s.x2} ${s.y2}L${s.xi2} ${s.yi2}A${inner} ${inner} 0 ${s.lf} 0 ${s.xi1} ${s.yi1}Z`} fill={s.c} stroke="#fff" strokeWidth={2}/>)}
      <text x={cx} y={cy-4} textAnchor="middle" fontSize={18} fontWeight={900} fill={INK} fontFamily="Nunito,sans-serif">{total}</text>
      <text x={cx} y={cy+13} textAnchor="middle" fontSize={9} fill={INK4} fontFamily="Nunito Sans,sans-serif">{lbl}</text>
    </svg>
    <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
      {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:9,height:9,borderRadius:2,background:s.c,flexShrink:0}}/>
        <span style={{fontSize:10.5,flex:1,color:INK3,fontWeight:600}}>{s.l}</span>
        <span style={{fontSize:10,color:INK4,fontFamily:"JetBrains Mono,monospace",fontWeight:700}}>{s.v}</span>
      </div>)}
    </div>
  </div>;
}

function BarChart({data,colors,h=150}){
  var entries=Object.entries(data),max=Math.max(...entries.map(([,v])=>v),1),W=48;
  return <svg viewBox={`0 -16 ${entries.length*W} ${h+44}`} style={{width:"100%",height:h+44}}>
    {entries.map(([l,v],i)=>{
      var bh=Math.round((v/max)*h),x=i*W+4,y=h-bh;
      return <g key={l}>
        <rect x={x} y={y} width={38} height={bh} rx={5} fill={colors[i%colors.length]}/>
        <text x={x+19} y={h+14} textAnchor="middle" fontSize={9} fill={INK4} fontFamily="Nunito Sans,sans-serif">{l.slice(0,8)}</text>
        {v>0&&<text x={x+19} y={y-4} textAnchor="middle" fontSize={9} fontWeight={700} fill={INK}>{v}</text>}
      </g>;
    })}
  </svg>;
}

function PageCobertura(){
  var [filtRep,setFiltRep]=useState(""),[ord,setOrd]=useState("dias"),[busca,setBusca]=useState("");
  var [visitasCob,setVisitasCob]=useState([]);
  var [clientesCob,setClientesCob]=useState([]);
  useEffect(()=>{
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getVisitas",representante:""})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setVisitasCob(res.data); }).catch(()=>{});
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getClientes",representante:""})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setClientesCob(res.data); }).catch(()=>{});
  },[]);
  // Calcular cobertura real
  var totClientes=clientesCob.length||REPS.reduce((a,r)=>a+r.c,0)||422;
  var clientesVisitados=new Set(visitasCob.map(v=>v.Cliente)).size;
  // clientes reais por representante (atualiza sozinho ao mexer na carteira)
  var cliPorRep={}; clientesCob.forEach(function(c){ var r=String(c.rep||"").trim()||"—"; cliPorRep[r]=(cliPorRep[r]||0)+1; });
  var visSetRep={}; visitasCob.forEach(function(v){ var r=String(v.Representante||"").trim()||"—"; if(!visSetRep[r]) visSetRep[r]={}; if(v.Cliente) visSetRep[r][v.Cliente]=1; });
  var repsCob=Object.keys(cliPorRep).sort(function(a,b){ return cliPorRep[b]-cliPorRep[a]; });
  var totVis=clientesVisitados;
  var totFrios=Math.max(0,totClientes-clientesVisitados);
  var cobMedia=totClientes>0?Math.round((totVis/totClientes)*100):0;
  var trintaDiasAtras=new Date(); trintaDiasAtras.setDate(trintaDiasAtras.getDate()-30);
  function parseDt(s){ return parseVisitaDate(s); }
  var fil=visitasCob.filter(v=>{
    var dt=parseDt(v.Data); if(!dt) return false;
    return dt<trintaDiasAtras&&(!filtRep||v.Representante===filtRep)&&(!busca||v.Cliente.toLowerCase().includes(busca.toLowerCase())||v.Cidade.toLowerCase().includes(busca.toLowerCase()));
  }).sort((a,b)=>ord==="dias"?b.d-a.d:a.n.localeCompare(b.n));
  var urg=fil.filter(c=>c.d>60).length,at=fil.filter(c=>c.d<=60).length;

  return <div>

function PageEficiencia(){
  var [visitas,setVisitas]=useState([]);

  var [soAlerta,setSoAlerta]=useState(false);
  useEffect(()=>{
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getVisitas",representante:""})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setVisitas(res.data); setLoading(false); }).catch(()=>setLoading(false));
  },[]);
  var ALERTA=4;
  var mapa={};
  visitas.forEach(function(v){
    var cli=String(v.Cliente||"").trim(); if(!cli) return;
    if(!mapa[cli]) mapa[cli]={cliente:cli,reps:{},total:0,prospec:0,temProposta:false,temVenda:false,ultima:null,ultimaTxt:""};
    var g=mapa[cli]; g.total++;
    var rep=v.Representante||"—"; g.reps[rep]=(g.reps[rep]||0)+1;
    var tp=v.Tipo_Visita||"";
    if(/prospec/i.test(tp)) g.prospec++;
    var st=v.Status_Negocio||"";
    if(st==="Proposta apresentada"||st==="Em negociação"||tp==="Negociação/Proposta Enviada") g.temProposta=true;
    if(st==="Venda realizada"||tp==="Fechamento de Venda") g.temVenda=true;
    var d=parseVisitaDate(v.Data);
    if(d&&(!g.ultima||d>g.ultima)){ g.ultima=d; g.ultimaTxt=v.Data; }
  });
  var clientes=Object.keys(mapa).map(function(k){
    var g=mapa[k]; var repTop="—",mx=-1;
    Object.keys(g.reps).forEach(function(r){ if(g.reps[r]>mx){mx=g.reps[r];repTop=r;} });
    var sit;
    if(g.temVenda) sit={k:"conv",l:"Convertido",cor:["#DCFCE7","#166534"],ic:"🟢",rank:3};
    else if(g.temProposta) sit={k:"and",l:"Em andamento",cor:["#FEF3C7","#78350F"],ic:"🟡",rank:2};
    else if(g.total>=ALERTA) sit={k:"alerta",l:"Sem avanço",cor:["#FEE2E2","#7F1D1D"],ic:"🔴",rank:0};
    else sit={k:"ini",l:"Inicial",cor:["#EEF2F7","#475569"],ic:"⚪",rank:1};
    return {cliente:g.cliente,rep:repTop,total:g.total,prospec:g.prospec,temProposta:g.temProposta,temVenda:g.temVenda,ultima:g.ultimaTxt,sit:sit};
  });
  var repsDisp=[]; clientes.forEach(function(c){ if(c.rep&&repsDisp.indexOf(c.rep)<0) repsDisp.push(c.rep); }); repsDisp.sort();
  var baseKpi=clientes.filter(function(c){ return repFiltro==="Todos"||c.rep===repFiltro; });
  var nAlerta=baseKpi.filter(function(c){return c.sit.k==="alerta";}).length;
  var nAnd=baseKpi.filter(function(c){return c.sit.k==="and";}).length;
  var nConv=baseKpi.filter(function(c){return c.sit.k==="conv";}).length;
  var alertaPorRep={}; clientes.filter(function(c){return c.sit.k==="alerta";}).forEach(function(c){ alertaPorRep[c.rep]=(alertaPorRep[c.rep]||0)+1; });
  var alertaRepList=Object.keys(alertaPorRep).map(function(k){return [k,alertaPorRep[k]];}).sort(function(a,b){return b[1]-a[1];});
  var alertaMax=alertaRepList.length?alertaRepList[0][1]:1;
  var filtrados=clientes.filter(function(c){
    if(repFiltro!=="Todos"&&c.rep!==repFiltro) return false;
    if(soAlerta&&c.sit.k!=="alerta") return false;
    return true;
  }).sort(function(a,b){ if(a.sit.rank!==b.sit.rank) return a.sit.rank-b.sit.rank; return b.total-a.total; });
  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",gap:12,color:INK3,fontSize:13}}><div style={{width:32,height:32,border:`3px solid ${VP}`,borderTop:`3px solid ${V}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/> Carregando acompanhamento...</div>;
  var SimNao=function(props){ return <span style={{display:"inline-block",fontSize:10,fontWeight:800,padding:"2px 9px",borderRadius:20,background:props.v?"#DCFCE7":"#F3F4F6",color:props.v?"#166534":"#9CA3AF"}}>{props.v?"Sim":"Não"}</span>; };
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>

      <KPI icon="🔴" val={nAlerta} lbl="Sem avanço (alerta)" delta={nAlerta>0?"Requer atenção":"Tudo certo"} ac="#DC2626" ib="#FEE2E2"/>
      <KPI icon="🟡" val={nAnd} lbl="Em andamento" delta="Com proposta, sem fechar" ac={O} ib={OP}/>
      <KPI icon="🟢" val={nConv} lbl="Convertidos" delta="Tiveram venda" up ac={V} ib={VP}/>
    </div>
    <div style={{background:"#FFF7ED",border:`1px solid ${O}`,borderRadius:10,padding:"10px 14px",fontSize:12,color:INK2,marginBottom:16,lineHeight:1.5}}>
      🔴 <b>Sem avanço</b> = cliente com <b>{ALERTA} ou mais visitas</b> e <b>nenhuma proposta nem venda</b> em todo o histórico — possível tempo investido sem retorno comercial.
    </div>
    {alertaRepList.length>0&&<Card title="Clientes sem avanço por representante">
      <div style={{display:"flex",flexDirection:"column",gap:9,marginTop:6}}>
        {alertaRepList.map(function(e){ return <div key={e[0]} style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:130,fontSize:12,fontWeight:700,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e[0].split(" ")[0]}</div>
          <div style={{flex:1,height:20,background:"#F0EBE4",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((e[1]/alertaMax)*100)}%`,background:"#DC2626",borderRadius:4,display:"flex",alignItems:"center",paddingLeft:8}}><span style={{fontSize:10,fontWeight:800,color:"#fff"}}>{e[1]}</span></div></div>
        </div>; })}
      </div>
    </Card>}
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 12px",flexWrap:"wrap"}}>
      <span style={{fontSize:12,fontWeight:800,color:INK3,textTransform:"uppercase",letterSpacing:".5px"}}>👤 Representante</span>
      <select value={repFiltro} onChange={function(e){setRepFiltro(e.target.value);}} style={{padding:"9px 14px",borderRadius:10,border:`1px solid ${BRD}`,background:"#fff",fontFamily:"Nunito,sans-serif",fontSize:13,fontWeight:700,color:INK,cursor:"pointer",minWidth:180}}>
        <option value="Todos">Todos os representantes</option>

    </div>
    <Card title={`Acompanhamento por cliente · ${filtrados.length}`}>
      {filtrados.length===0&&<div style={{textAlign:"center",padding:"28px",color:INK4,fontSize:13}}>Nenhum cliente para os filtros selecionados.</div>}
      {filtrados.length>0&&<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Cliente","Representante","Total de Visitas","Prospecções","Teve Proposta","Teve Fechamento","Última Visita","Situação"].map(function(hh){return <th key={hh} style={{fontSize:9.5,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".4px",padding:"7px 8px",textAlign:"left",borderBottom:`1.5px solid ${BRD}`,whiteSpace:"nowrap"}}>{hh}</th>;})}</tr></thead>
        <tbody>{filtrados.map(function(c){ return <tr key={c.cliente} style={{borderBottom:`1px solid ${BRD}`,background:c.sit.k==="alerta"?"#FEF2F2":"transparent"}}>
          <td style={{padding:"9px 8px",fontSize:12,fontWeight:700,color:INK}}>{c.cliente}</td>

        </tr>; })}</tbody>
      </table></div>}
    </Card>
  </div>;

function PageComercial(){
  var [visitasCom,setVisitasCom]=useState([]);
  useEffect(()=>{
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getVisitas",representante:""})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setVisitasCom(res.data); }).catch(()=>{});
  },[]);
  // Calcular KPIs reais
  var hoje=new Date();
  var semStart=new Date(hoje); semStart.setDate(hoje.getDate()-6);
  var mesStart=new Date(hoje); mesStart.setDate(1);
  var semAntStart=new Date(hoje); semAntStart.setDate(hoje.getDate()-13);
  var semAntEnd=new Date(hoje); semAntEnd.setDate(hoje.getDate()-7);
  var mesAntStart=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
  var mesAntEnd=new Date(hoje.getFullYear(),hoje.getMonth(),0);
  function parseDt(s){ return parseVisitaDate(s); }
  function inRange(v,s,e){ var d=parseDt(v.Data); return d&&d>=s&&d<=e; }
  var visSem=visitasCom.filter(v=>inRange(v,semStart,hoje));
  var visMes=visitasCom.filter(v=>inRange(v,mesStart,hoje));
  var visSemanterior=visitasCom.filter(v=>inRange(v,semAntStart,semAntEnd));
  var visMesAnterior=visitasCom.filter(v=>inRange(v,mesAntStart,mesAntEnd));
  var ehV=function(v){return v.Status_Negocio==="Venda realizada"||v.Tipo_Visita==="Fechamento de Venda";};
  var ehP=function(v){return v.Status_Negocio==="Proposta apresentada"||v.Status_Negocio==="Em negociação"||v.Tipo_Visita==="Negociação/Proposta Enviada";};
  var sem={f:visSem.filter(ehV).length,v:visSem.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),p:visSem.filter(ehP).length};
  var sA={f:visSemanterior.filter(ehV).length,v:visSemanterior.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),p:visSemanterior.filter(ehP).length};
  var mes={f:visMes.filter(ehV).length,v:visMes.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),p:visMes.filter(ehP).length};
  var mA={f:visMesAnterior.filter(ehV).length,v:visMesAnterior.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),p:visMesAnterior.filter(ehP).length};
  var conv=mes.p>0?Math.round((mes.f/mes.p)*100):0;
  var prosMes=visMes.filter(v=>/prospec/i.test(v.Tipo_Visita||"")).length;
  var avalMes=visMes.filter(v=>/avalia|teste/i.test(v.Tipo_Visita||"")).length;
  var negMes=visMes.filter(v=>v.Status_Negocio==="Em negociação").length;
  var funnel=[{l:"Prospecções",n:prosMes,c:V},{l:"Avaliações",n:avalMes,c:V2},{l:"Propostas",n:mes.p,c:O},{l:"Negociações",n:negMes,c:M},{l:"Fechamentos",n:mes.f,c:"#16A34A"}];
  var funMax=Math.max(1,...funnel.map(e=>e.n));
  var prodCount={}, prodDisp={};
  visMes.forEach(v=>String(v.Produtos||"").split(/[,;]+/).map(p=>p.trim()).filter(Boolean).forEach(p=>{
    var noHash=p.replace(/^#/,''); var key=noHash.replace(/\s+/g,'').toLowerCase();
    prodCount[key]=(prodCount[key]||0)+1; if(!prodDisp[key]) prodDisp[key]='#'+noHash.replace(/\s+/g,'');
  }));
  var prodList=Object.keys(prodCount).map(k=>[prodDisp[k],prodCount[k]]).sort((a,b)=>b[1]-a[1]).slice(0,6);
  var prodMax=prodList.length?prodList[0][1]:1;
  var concorr=visMes.filter(v=>/concorr/i.test(String(v.Produtos||"")+" "+String(v.Tags||""))).length;
  var pipeRep=REPS.map(function(r){
    var vr=visMes.filter(v=>v.Representante===r.n);
    var pros=vr.filter(v=>/prospec/i.test(v.Tipo_Visita||"")).length;
    var neg=vr.filter(v=>v.Status_Negocio==="Em negociação").length;
    var fec=vr.filter(ehV).length;
    var val=vr.filter(ehV).reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0);
    return {r:r,pros:pros,neg:neg,fec:fec,val:val};
  });
  function DB({cur,ant,fmt}){
    var d=cur-ant;
    return <div style={{flex:1,background:BG,borderRadius:8,padding:"9px 10px",textAlign:"center"}}>
      <div style={{fontFamily:"Nunito,sans-serif",fontSize:17,fontWeight:800,color:d>=0?"#16A34A":"#DC2626"}}>{d>=0?"+":""}{fmt?fmt(Math.abs(d)):d}</div>
      <div style={{fontSize:8.5,color:INK4,fontWeight:700,textTransform:"uppercase",letterSpacing:".3px",marginTop:2,lineHeight:1.2}}>{ant===sA.f||ant===sA.v||ant===sA.p?"vs. Semana Anterior":"vs. Mês Anterior"}</div>

        [mes.f,"Fechamentos · mês","✅",O,OP,mes.f,sA.f,mA.f,null],
        [mes.p,"Propostas enviadas","📄",M,MP,mes.p,sA.p,mA.p,null],
        [`${conv}%`,"Taxa de conversão","🎯",B,BP,null,null,null,null]
      ].map(([val,lbl,icon,ac,ib,cur,ant1,ant2,fmt],i)=>(
        <div key={i} style={{...sh,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:ac}}/>
          <div style={{width:38,height:38,borderRadius:10,background:ib,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,marginBottom:10}}>{icon}</div>
          <div style={{fontFamily:"Nunito,sans-serif",fontSize:26,fontWeight:900,lineHeight:1}}>{val}</div>
          <div style={{fontSize:10.5,fontWeight:700,color:INK4,textTransform:"uppercase",letterSpacing:".8px",marginTop:3}}>{lbl}</div>
          {cur!==null&&<div style={{display:"flex",gap:8,marginTop:10}}>
            <DB cur={cur} ant={ant1} fmt={fmt}/>
            <DB cur={cur} ant={ant2} fmt={fmt}/>
          </div>}
          {cur===null&&<div style={{fontSize:10.5,fontWeight:700,marginTop:7,color:"#16A34A"}}>Proposta → Fechamento</div>}
        </div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
      <Card title="Funil de vendas · mês">
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
          {funnel.map(e=>(
            <div key={e.l} style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:120,fontSize:11.5,fontWeight:700,flexShrink:0}}>{e.l}</div>
              <div style={{flex:1,height:24,background:"#F0EBE4",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.round((e.n/funMax)*100)}%`,background:e.c,borderRadius:4,display:"flex",alignItems:"center",paddingLeft:9}}>
                  <span style={{fontSize:10,fontWeight:800,color:"#fff"}}>{e.n}</span>
                </div>
              </div>
              <div style={{fontSize:10.5,color:INK4,fontFamily:"JetBrains Mono,monospace",fontWeight:700,minWidth:32}}>{Math.round((e.n/funMax)*100)}%</div>
            </div>
          ))}
        </div>
      </Card>
      <Card title="Produtos · frequência">
        {prodList.length===0&&<div style={{fontSize:11.5,color:INK4,padding:"6px 0"}}>Sem registros de produtos no período.</div>}
        {prodList.map(([n,v],idx)=>{
          var c=[V,V2,O,M,B,"#16A34A"][idx%6];
          return <div key={n} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,width:160,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div>
            <div style={{flex:1,height:8,background:"#F0EBE4",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((v/prodMax)*100)}%`,background:c,borderRadius:4}}/></div>
            <div style={{fontSize:11,fontFamily:"JetBrains Mono,monospace",fontWeight:800,color:INK3}}>{v}</div>
          </div>;
        })}
        {concorr>0&&<details style={{marginTop:14}}>
          <summary style={{padding:12,background:OP,borderRadius:8,borderLeft:`3px solid ${O}`,cursor:"pointer",listStyle:"none"}}>
            <div style={{fontSize:11,fontWeight:700,color:M,marginBottom:4}}>⚠️ Alerta concorrência <span style={{fontWeight:600,color:INK4}}>(clique para ver quais)</span></div>
            <div style={{fontSize:11,color:INK3,lineHeight:1.5}}>{concorr} visita(s) com produto concorrente. Analisar reconversão.</div>
          </summary>
          <div style={{padding:"8px 12px 2px"}}>
            {visMes.filter(v=>/concorr/i.test(String(v.Produtos||"")+" "+String(v.Tags||""))).map((v,i)=>(
              <div key={i} style={{fontSize:11.5,color:INK2,padding:"6px 0",borderBottom:`1px solid #F0EBE4`}}>
                <b>{v.Cliente||"—"}</b> · {v.Representante||"—"}{v.Cidade?(" · "+v.Cidade):""}{v.Data?(" · "+(parseVisitaDate(v.Data)?parseVisitaDate(v.Data).toLocaleDateString("pt-BR"):"")):""}
              </div>
            ))}
          </div>
        </details>}
      </Card>
    </div>
    <Card title="Pipeline por representante">
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Representante","Prospecções","Negociações","Fechamentos","Valor Negociado","Conversão"].map(h=><th key={h} style={{fontSize:9.5,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".4px",padding:"6px 8px",textAlign:"left",borderBottom:`1.5px solid ${BRD}`}}>{h}</th>)}</tr></thead>
        <tbody>{pipeRep.map(({r,pros,neg,fec,val})=>{
          return <tr key={r.n} style={{borderBottom:`1px solid ${BRD}`}}>
            <td style={{padding:"9px 8px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><Av ini={r.i}/><span style={{fontSize:12,fontWeight:700}}>{r.n.split(" ")[0]}</span></div></td>
            <td style={{padding:"9px 8px",fontFamily:"JetBrains Mono,monospace",fontSize:12}}>{pros}</td>
            <td style={{padding:"9px 8px",fontFamily:"JetBrains Mono,monospace",fontSize:12}}>{neg}</td>
            <td style={{padding:"9px 8px",fontFamily:"JetBrains Mono,monospace",fontSize:12,color:V,fontWeight:700}}>{fec}</td>
            <td style={{padding:"9px 8px",fontFamily:"JetBrains Mono,monospace",fontSize:11}}>R$ {(val/1000).toFixed(0)}k</td>
            <td style={{padding:"9px 8px"}}><Pill txt={fec>0?`${pros>0?Math.round((fec/pros)*100):100}%`:"0%"} ok={fec>0}/></td>
          </tr>;
        })}</tbody>
      </table>
    </Card>
  </div>;
}

function PagePreCadastros(){
  var [lista,setLista]=useState([]);
  var [filtro,setFiltro]=useState("todos");
  var [busca,setBusca]=useState("");
  var [chatPc,setChatPc]=useState(null);
  var [msgsPc,setMsgsPc]=useState({});
  var [editId,setEditId]=useState(null);
  var [editForm,setEditForm]=useState({});
  useEffect(()=>{
    function carregar(){ fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getPreCadastros"})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setLista(res.data); }).catch(()=>{}); }
    carregar();
    var _t=setInterval(carregar,30000);
    return ()=>clearInterval(_t);
  },[]);;
  var [novaMsgPc,setNovaMsgPc]=useState("");
  var [aprovPc,setAprovPc]=useState(null);
  var [credAp,setCredAp]=useState("");
  var [prazoAp,setPrazoAp]=useState("");
  var chatPcEndRef=useRef(null);
  useEffect(()=>{if(chatPcEndRef.current)chatPcEndRef.current.scrollIntoView({behavior:"smooth"});},[chatPc,msgsPc]);

  var pendentes=lista.filter(p=>p.status==="Pendente").length;
  var fil=lista.filter(p=>
    (filtro==="todos"||p.status===filtro)&&
    (!busca||String(p.nome||"").toLowerCase().includes(busca.toLowerCase())||String(p.representante||"").toLowerCase().includes(busca.toLowerCase())||String(p.cidade||"").toLowerCase().includes(busca.toLowerCase()))
  );

  function atualizarStatus(id,novoStatus,credAprov,prazoAprov){
    // Cadastrar: só vira "Cadastrado" se o cliente realmente entrar na carteira
    if(novoStatus==="Cadastrado"){
      var pc=lista.find(p=>p.id===id);
      if(!pc) return;
      fetch("https://script.google.com/macros/s/AKfycbzTPbl8CvTireGpFcVpeEkN3Jy6ttCzmrZRM1v5Qnq2pR2mWxEN_-CfV3bMvhrXww2q/exec",{
        method:"POST",
        body:JSON.stringify({
          action:"confirmarCadastro",
          id:pc.id,
          nome:pc.nome,
          logradouro:pc.logradouro||"",
          numero:pc.numero||"",
          bairro:pc.bairro||"",
          cidade:pc.cidade,
          estado:pc.estado||"SP",
          telefone:pc.telefone||"",
          email:pc.email_cliente||"",
          documento:pc.documento||"",
          representante:pc.representante,
          credito_aprovado:credAprov||"",
          prazo_aprovado:prazoAprov||"",
        })
      })
      .then(r=>r.json())
      .then(res=>{
        if(res.ok){
          setLista(l=>l.map(p=>p.id===id?{...p,status:"Cadastrado",credito_aprovado:credAprov||"",prazo_aprovado:prazoAprov||""}:p));
          alert(res.jaExistia ? ("✅ '"+pc.nome+"' já estava na carteira de "+pc.representante+". Devolutiva registrada.") : ("✅ Cliente '"+pc.nome+"' adicionado à carteira de "+pc.representante+"!"));
        } else {
          alert("⚠️ O cadastro NÃO foi concluído: "+(res.error||"tente novamente")+". O status não foi alterado.");
        }
      })
      .catch(()=>alert("⚠️ Sem conexão com o servidor. O cadastro não foi concluído; tente novamente."));
      return;
    }
    // Demais status (Em análise, Recusado)
    setLista(l=>l.map(p=>p.id===id?{...p,status:novoStatus}:p));
    fetch("https://script.google.com/macros/s/AKfycbzTPbl8CvTireGpFcVpeEkN3Jy6ttCzmrZRM1v5Qnq2pR2mWxEN_-CfV3bMvhrXww2q/exec",{
      method:"POST",
      body:JSON.stringify({action:"atualizarPreCadastro",id:id,status:novoStatus})
    }).catch(()=>{});
  }

  function carregarMsgsPc(pid){
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getMsgsPreCadastro",precadastro_id:pid})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&Array.isArray(res.data)) setMsgsPc(m=>({...m,[pid]:res.data})); }).catch(()=>{});
  }
  function abrirChatPc(pid){
    var novo=chatPc===pid?null:pid;
    setChatPc(novo);
    if(novo) carregarMsgsPc(novo);
  }
  function enviarMsgPc(){
    if(!novaMsgPc.trim()||!chatPc) return;
    var texto=novaMsgPc.trim();
    var nova={id:"m"+Date.now(),autor:nomeGestor(),tipo:"gestor",msg:texto,hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})+"h",data:"Agora"};
    setMsgsPc(m=>({...m,[chatPc]:[...(m[chatPc]||[]),nova]}));
    setNovaMsgPc("");
    var pc=lista.find(p=>p.id===chatPc);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"enviarMsgPreCadastro",precadastro_id:chatPc,representante:pc?pc.representante:"",mensagem:{autor:nomeGestor(),tipo:"gestor",msg:texto}})}).catch(()=>{});
  }

  function abrirEdicao(p){
    setEditId(p.id);
    setEditForm({Nome:p.nome||"",Logradouro:p.logradouro||"",Numero:p.numero||"",Bairro:p.bairro||"",Cidade:p.cidade||"",Estado:p.estado||"",Telefone:p.telefone||"",Email_Cliente:p.email_cliente||"",Documento:p.documento||"",IE:p.ie||"",Regime_Tributario:p.regime_tributario||"",Contribuinte_ICMS:p.contribuinte_icms||"",Culturas:p.culturas||"",Area_ha:p.area_ha||"",Credito_Solicitado:p.credito_solicitado||"",Volume_Previsto:p.volume_previsto||"",Observacoes:p.observacoes||""});
  }
  function setCampo(k,v){ setEditForm(f=>({...f,[k]:v})); }
  function salvarEdicao(id){
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"editarPreCadastro",id:id,campos:editForm})})
      .then(r=>r.json()).then(res=>{
        if(res.ok){
          setLista(l=>l.map(p=>p.id===id?{...p,nome:editForm.Nome,logradouro:editForm.Logradouro,numero:editForm.Numero,bairro:editForm.Bairro,cidade:editForm.Cidade,estado:editForm.Estado,telefone:editForm.Telefone,email_cliente:editForm.Email_Cliente,documento:editForm.Documento,ie:editForm.IE,culturas:editForm.Culturas,area_ha:editForm.Area_ha,credito_solicitado:editForm.Credito_Solicitado,volume_previsto:editForm.Volume_Previsto,observacoes:editForm.Observacoes}:p));
          setEditId(null);
        } else alert("⚠️ "+(res.error||"Erro ao salvar"));
      }).catch(()=>alert("⚠️ Sem conexão com o servidor."));
  }
  function devolver(id){
    var motivo=window.prompt("Descreva o que o representante precisa corrigir/completar:");
    if(motivo===null) return;
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"devolverPreCadastro",id:id,motivo:motivo})})
      .then(r=>r.json()).then(res=>{
        if(res.ok) setLista(l=>l.map(p=>p.id===id?{...p,status:"Devolvido",motivo_devolucao:motivo}:p));
        else alert("⚠️ "+(res.error||"Erro"));
      }).catch(()=>alert("⚠️ Sem conexão com o servidor."));
  }
  var statusCor={
    "Pendente":{bg:"#FEE2E2",c:"#7F1D1D",dot:"#DC2626"},
    "Em análise":{bg:"#FEF3C7",c:"#78350F",dot:"#CA8A04"},
    "Cadastrado":{bg:"#DCFCE7",c:"#166534",dot:"#16A34A"},
    "Recusado":{bg:"#F3F4F6",c:"#4B5563",dot:"#9CA3AF"},
    "Devolvido":{bg:"#FFEDD5",c:"#9A3412",dot:"#EA580C"},
  };

  return <div>
    {aprovPc&&<div onClick={e=>{if(e.target===e.currentTarget)setAprovPc(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:"22px 24px",width:380,maxWidth:"90vw",boxShadow:"0 12px 40px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:16,fontWeight:900,color:V,fontFamily:"Nunito,sans-serif"}}>Aprovar cadastro</div>
        <div style={{fontSize:12.5,color:INK3,marginTop:3,marginBottom:14}}>{aprovPc.nome} — informe o crédito e/ou o prazo aprovado (opcional). O vendedor verá no app.</div>
        <label style={{fontSize:11,fontWeight:800,color:INK4}}>Crédito aprovado (R$)</label>

        <label style={{fontSize:11,fontWeight:800,color:INK4}}>Prazo aprovado</label>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>setAprovPc(null)} style={{padding:"9px 16px",background:"#F3F4F6",color:"#4B5563",border:`1px solid ${BRD}`,borderRadius:20,fontWeight:800,fontSize:12,fontFamily:"Nunito,sans-serif",cursor:"pointer"}}>Cancelar</button>
          <button onClick={()=>{atualizarStatus(aprovPc.id,"Cadastrado",credAp,prazoAp);setAprovPc(null);}} style={{padding:"9px 18px",background:V,color:"#fff",border:"none",borderRadius:20,fontWeight:800,fontSize:12,fontFamily:"Nunito,sans-serif",cursor:"pointer"}}>✅ Confirmar cadastro</button>
        </div>
      </div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      <KPI icon="🆕" val={pendentes} lbl="Pendentes" delta="Aguardando cadastro" ac="#DC2626" ib="#FEE2E2"/>
      <KPI icon="🔍" val={lista.filter(p=>p.status==="Em análise").length} lbl="Em análise" delta="Backoffice analisando" ac={O} ib={OP}/>
      <KPI icon="✅" val={lista.filter(p=>p.status==="Cadastrado").length} lbl="Cadastrados" delta="Concluídos" up ac={V} ib={VP}/>

    </div>

    <div style={{...sh,marginBottom:20,padding:"16px 20px",background:"#FEF3C7",border:`1.5px solid #CA8A04`,borderLeft:`4px solid #CA8A04`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>📧</span>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#78350F",fontFamily:"Nunito,sans-serif"}}>Notificações automáticas ativas</div>

            Quando um representante cria um pré-cadastro, os e-mails abaixo são notificados automaticamente:<br/>
            <strong>lucas.rugine@teranv.com.br · viviane.soldera@teraambiental.com.br · caroline.nascimento@teranv.com.br · pedro.amorim@teranv.com.br</strong>
          </div>
        </div>
      </div>

    <Card title={`Pré-cadastros recebidos · ${fil.length} resultado(s)`}
      action={<div style={{display:"flex",gap:8,alignItems:"center"}}>

    >
      {fil.length===0&&<div style={{textAlign:"center",padding:"32px",color:INK4,fontSize:13}}>
        <div style={{fontSize:32,marginBottom:8}}>🆕</div>

      </div>}
      {fil.map((p,i)=>{
        var sc=statusCor[p.status]||statusCor["Pendente"];
        return <div key={p.id} style={{padding:"16px 0",borderBottom:i<fil.length-1?`1px solid ${BRD}`:"none"}}>

              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>

var RepCtx=createContext("");

      }).catch(()=>alert("⚠️ Sem conexão com o servidor."))
      .finally(()=>{ window.__pdfBusy[id]=false; });

  function _brToIso(s){ s=String(s||""); var p=s.split("/"); return p.length===3?(p[2]+"-"+p[1]+"-"+p[0]):""; }

        <div style={lbl}>Tipo de vencimento</div>

        {epForm.tipo_vencimento==="Dias"&&<div><div style={lbl}>Condição (dias)</div><input value={epForm.condicao} onChange={e=>epSet("condicao",e.target.value)} placeholder="ex.: 30/60/90 dias" style={ist}/></div>}
        {epForm.tipo_vencimento==="Data Fixa"&&<div><div style={lbl}>Data de pagamento</div><input type="date" value={epForm.data_pag_iso} onChange={e=>epSet("data_pag_iso",e.target.value)} style={ist}/></div>}
        {epForm.tipo_vencimento==="Data Fixa Parcelada"&&<div><div style={lbl}>Quantidade de parcelas</div><select value={epForm.parc_qtd} onChange={e=>epSet("parc_qtd",e.target.value)} style={ist}><option value="2">2 parcelas</option><option value="3">3 parcelas</option></select>{[0,1,2].slice(0,parseInt(epForm.parc_qtd,10)||2).map(i=>(<div key={i}><div style={lbl}>Vencimento da {i+1}ª parcela</div><input type="date" value={(epForm.parc_datas||[])[i]||""} onChange={e=>epParcSet(i,e.target.value)} style={ist}/></div>))}</div>}
        <div style={{display:"flex",gap:10}}>

          <div style={{flex:1}}><div style={lbl}>Previsão de retirada</div><input type="date" value={epForm.prev_iso} onChange={e=>epSet("prev_iso",e.target.value)} style={ist}/></div>
        </div>
        <div style={lbl}>Planta</div>
        <select value={epForm.planta} onChange={e=>epSet("planta",e.target.value)} style={ist}><option>Jundiaí</option><option>Paulínia</option></select>
        <div style={lbl}>Contato p/ assinatura</div>
        <input value={epForm.contato} onChange={e=>epSet("contato",e.target.value)} placeholder="WhatsApp ou e-mail" style={ist}/>
        <div style={lbl}>Observação</div>
        <textarea value={epForm.observacoes} onChange={e=>epSet("observacoes",e.target.value)} rows={2} style={{...ist,resize:"vertical"}}/>
        <div style={lbl}>Correção financeira</div>
        <select value={epForm.corrigir?"sim":"nao"} onChange={e=>epSet("corrigir",e.target.value==="sim")} style={ist}><option value="sim">Cobrar correção</option><option value="nao">Não cobrar</option></select>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={()=>setEditPed(null)} style={{padding:"9px 16px",background:"#F3F4F6",color:"#4B5563",border:`1px solid ${BRD}`,borderRadius:20,fontWeight:800,fontSize:12,cursor:"pointer"}}>Cancelar</button>
          <button disabled={epSaving} onClick={salvarEditPed} style={{padding:"9px 18px",background:V,color:"#fff",border:"none",borderRadius:20,fontWeight:800,fontSize:12,cursor:"pointer",opacity:epSaving?0.6:1}}>{epSaving?"Salvando...":"💾 Salvar edição"}</button>
        </div>
      </div>
    </div>}
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <span style={{fontSize:12,fontWeight:800,color:INK3,textTransform:"uppercase",letterSpacing:".5px"}}>🌱 Filtrar por cultura</span>
      <select value={cultura} onChange={e=>setCultura(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:`1px solid ${BRD}`,background:"#fff",fontFamily:"Nunito,sans-serif",fontSize:13,fontWeight:700,color:INK,cursor:"pointer",minWidth:200}}>

      {cultura!=="Todas"&&<span style={{background:VP,color:V,fontSize:11.5,fontWeight:800,padding:"5px 12px",borderRadius:20}}>{lista0.length} {lista0.length===1?"venda":"vendas"} de {cultura} no período</span>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>

      <KPI icon="⏳" val={pend} lbl="Aguardando aprovação" delta={pend>0?"Ação necessária":"Tudo em dia"} ac={O} ib={OP}/>
      <KPI icon="💰" val={brl(valTotal)} lbl={cultura==="Todas"?"Valor total":"Valor em "+cultura} ac={B} ib={BP}/>
      <KPI icon="🎯" val={brl(ticket)} lbl="Ticket médio" ac={M} ib={MP}/>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
      <Card title="Valor por representante (R$ mil)"><BarChart data={porRepK} colors={[V,O,M,B,"#9333EA","#16A34A","#CA8A04"]} h={170}/></Card>
      <Card title="Valor por mês (R$ mil)"><BarChart data={porMesK} colors={[O]} h={170}/></Card>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>

      <Card title="Pedidos por planta"><Donut data={porPlanta} colors={[V,O]} lbl="pedidos"/></Card>
    </div>
    <div style={{marginBottom:18}}>
      <Card title="Pedidos por cultura (nº de vendas)"><BarChart data={porCultura} colors={["#16A34A",V,O,M,B,"#9333EA","#CA8A04","#0EA5E9"]} h={180}/></Card>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>

        {canalRepList.length===0&&<div style={{fontSize:12,color:INK4,padding:"6px 0"}}>Sem vendas no período.</div>}

          <thead><tr>{["Representante","🤝 Presencial","📞 Remoto","% Remoto"].map(hh=><th key={hh} style={{fontSize:9.5,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".4px",padding:"6px 8px",textAlign:"left",borderBottom:`1.5px solid ${BRD}`,whiteSpace:"nowrap"}}>{hh}</th>)}</tr></thead>
          <tbody>{canalRepList.map(function(r){ var pr=porCanalRep[r].Presencial, rm=porCanalRep[r].Remoto, tot=pr+rm, pctRem=tot?Math.round(rm/tot*100):0; return <tr key={r} style={{borderBottom:`1px solid ${BRD}`}}>
            <td style={{padding:"8px",fontSize:12,fontWeight:700}}>{r}</td>
            <td style={{padding:"8px",fontFamily:"JetBrains Mono,monospace",fontSize:12.5,color:V,fontWeight:700}}>{pr}</td>

            <td style={{padding:"8px"}}><span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20,background:pctRem>=80?"#FEE2E2":pctRem>=50?"#FEF3C7":"#DCFCE7",color:pctRem>=80?"#7F1D1D":pctRem>=50?"#78350F":"#166534"}}>{pctRem}%</span></td>
          </tr>; })}</tbody>
        </table></div>}
      </Card>
    </div>
    {tkTon&&<Card title="🎯 Ticket médio por tonelada" style={{marginBottom:18}}>

          <div key={lb} style={{background:BG,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:10.5,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".4px"}}>{lb}</div>
            <div style={{fontSize:18,fontWeight:900,color:V,marginTop:4}}>{brl(o.ticket)}<span style={{fontSize:11,fontWeight:600,color:INK4}}>/t</span></div>
            <div style={{fontSize:10.5,color:INK4,marginTop:2}}>{(o.ton||0).toLocaleString("pt-BR")} t · {brl(o.valor)}</div>
          </div>

      </div>
      <div style={{fontSize:11,fontWeight:800,color:INK3,marginBottom:6}}>Por representante (R$/tonelada)</div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Representante","Granel","Ensacado","Geral"].map(hh=><th key={hh} style={{fontSize:9.5,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".4px",padding:"6px 8px",textAlign:"left",borderBottom:`1.5px solid ${BRD}`,whiteSpace:"nowrap"}}>{hh}</th>)}</tr></thead>
        <tbody>{Object.keys(tkTon.por_vendedor||{}).sort().map(function(vn){ var o=tkTon.por_vendedor[vn]; return <tr key={vn} style={{borderBottom:`1px solid ${BRD}`}}>
          <td style={{padding:"8px",fontSize:12,fontWeight:700}}>{vn}</td>
          <td style={{padding:"8px",fontFamily:"JetBrains Mono,monospace",fontSize:12}}>{o.granel.ton>0?brl(o.granel.ticket):"—"}</td>
          <td style={{padding:"8px",fontFamily:"JetBrains Mono,monospace",fontSize:12}}>{o.ensacado.ton>0?brl(o.ensacado.ticket):"—"}</td>
          <td style={{padding:"8px",fontFamily:"JetBrains Mono,monospace",fontSize:12,fontWeight:700,color:V}}>{o.geral.ton>0?brl(o.geral.ticket):"—"}</td>
        </tr>; })}</tbody>
      </table></div>
    </Card>}
    <Card title={`Pedidos de venda · ${lista0.length}`}>

      {lista0.map((p,i)=>{
        var c=cor[p.status]||cor["Aguardando aprovacao"];
        var pendente=p.status==="Aguardando aprovacao";
        return <div key={p.id} style={{padding:"14px 0",borderBottom:i<lista0.length-1?`1px solid ${BRD}`:"none"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                <span style={{fontFamily:"Nunito,sans-serif",fontSize:13.5,fontWeight:900,color:INK}}>{p.id}</span>
                <span style={{background:c[0],color:c[1],fontSize:9.5,fontWeight:800,padding:"2px 9px",borderRadius:20}}>{p.status==="Aguardando aprovacao"?"Aguardando aprovação":p.status}</span>
                {p.corrigir==="Nao"&&<span style={{background:"#FEE2E2",color:"#7F1D1D",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:20}}>sem correção</span>}
              </div>
              <div style={{fontSize:12.5,fontWeight:700,color:INK2}}>{p.cliente}</div>
              <div style={{fontSize:11,color:INK3,marginTop:2}}>👤 {p.vendedor} · 🏭 {p.planta} · 📅 {p.data}{p.tipo_atendimento?(p.tipo_atendimento==="Remoto"?" · 📞 Remoto":" · 🤝 Presencial"):""}</div>
              {p.culturas&&p.culturas.length>0&&<div style={{fontSize:11,color:INK3,marginTop:2}}>🌱 {p.culturas.join(", ")}</div>}
              {p.contato&&p.contato!=="#ERROR!"&&!String(p.contato).startsWith("#")&&<div style={{fontSize:11,color:INK2,marginTop:2,fontWeight:700}}>✍️ Contato p/ assinatura: <span style={{color:O}}>{p.contato}</span></div>}
              <div style={{fontSize:12,fontWeight:800,color:V,marginTop:4}}>{brl(p.total)}{parseFloat(p.correcao)>0?<span style={{fontWeight:600,color:INK4,fontSize:11}}> (correção {brl(p.correcao)})</span>:null}</div>
              <div style={{marginTop:6,background:BG,borderRadius:8,padding:"7px 10px",fontSize:11,color:INK3,lineHeight:1.7}}>
                {p.tipo_vencimento==="Data Fixa Parcelada"
                  ? <div>💳 <b>Pagamento parcelado:</b>{(p.parcelas||[]).map((x,k)=><div key={k} style={{paddingLeft:14}}>• Parcela {x.n} — {x.data||"—"}: <b>{brl(x.valor)}</b>{x.correcao>0?<span style={{color:O,fontSize:10}}> (financeiro {brl(x.correcao)})</span>:null}</div>)}</div>
                  : <div>💳 <b>Pagamento:</b> {p.tipo_vencimento==="Data Fixa"?("Data fixa · "+(p.data_pagamento||"—")):("Dias · "+(p.condicao||"—"))}</div>}
                <div>📦 <b>Retirada:</b> data fim {p.data_fim||"—"} · previsão {p.previsao||"—"}</div>
                {p.observacoes&&<div>📝 <b>Observação:</b> {p.observacoes}</div>}
                {p.comentario_gestao&&<div style={{color:"#9A3412",marginTop:2}}>💬 <b>Comentário enviado:</b> {p.comentario_gestao}</div>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
              {pendente&&<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                <button onClick={()=>aprovar(p.id,true)} style={{padding:"7px 14px",background:V,color:"#fff",border:"none",borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>✅ Aprovar</button>
                <button onClick={()=>comentar(p.id)} style={{padding:"7px 14px",background:"#FFF7ED",color:"#9A3412",border:`1px solid #FED7AA`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>💬 Comentar</button>
                <button onClick={()=>abrirEditarPed(p)} style={{padding:"7px 14px",background:"#EEF2FF",color:"#3730A3",border:`1px solid #C7D2FE`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>✏️ Editar</button>
                <button onClick={()=>aprovar(p.id,false)} style={{padding:"7px 14px",background:"#F3F4F6",color:"#4B5563",border:`1px solid ${BRD}`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>✕ Recusar</button>
              </div>}
              {!pendente&&p.status!=="Cancelado"&&<button onClick={()=>comentar(p.id)} style={{padding:"7px 14px",background:"#FFF7ED",color:"#9A3412",border:`1px solid #FED7AA`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>💬 Comentar</button>}
              {p.status==="Formalizado"&&<button onClick={()=>gerarPdf(p.id)} style={{padding:"7px 14px",background:V,color:"#fff",border:"none",borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>📧 Gerar PDF</button>}
              <span onClick={()=>toggleItens(p.id)} style={{fontSize:11,fontWeight:700,color:V3,cursor:"pointer"}}>{aberto===p.id?"Ocultar itens ▲":"Ver itens ▼"}</span>
            </div>
          </div>
          {aberto===p.id&&<div style={{marginTop:10,background:BG,borderRadius:8,padding:"8px 10px"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["Produto","Cultura","Qtd","Unidade","Preço unit.","Total"].map(hh=><th key={hh} style={{fontSize:9,fontWeight:800,color:INK4,textTransform:"uppercase",letterSpacing:".5px",padding:"4px 8px",textAlign:"left"}}>{hh}</th>)}</tr></thead>
              <tbody>{(itensMap[p.id]||[]).map((it,j)=><tr key={j}>
                <td style={{fontSize:11,padding:"4px 8px"}}>{it.produto}</td>
                <td style={{fontSize:11,padding:"4px 8px"}}>{it.cultura}</td>
                <td style={{fontSize:11,padding:"4px 8px"}}>{it.quantidade}</td>
                <td style={{fontSize:11,padding:"4px 8px"}}>{it.unidade}</td>
                <td style={{fontSize:11,padding:"4px 8px"}}>{brl(it.preco)}</td>
                <td style={{fontSize:11,padding:"4px 8px",fontWeight:700}}>{brl(it.total)}</td>
              </tr>)}</tbody>
            </table>
            {!itensMap[p.id]&&<div style={{fontSize:11,color:INK4,padding:"4px 8px"}}>Carregando itens...</div>}
          </div>}
        </div>;
      })}
    </Card>
  </div>;
}

      </nav>
      <div style={{padding:14,borderTop:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",gap:9,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,minWidth:0}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.2)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0}}>{iniGestor()}</div>
          <div style={{minWidth:0}}><div style={{fontSize:11.5,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nomeGestor()}</div><div style={{fontSize:9.5,color:"rgba(255,255,255,.45)"}}>Gestão · Tera NV</div></div>
        </div>
        <button onClick={()=>{try{localStorage.removeItem("tera_dash_sessao");}catch(e){};window.location.reload();}} title="Sair" style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",color:"rgba(255,255,255,.8)",borderRadius:8,padding:"5px 10px",fontFamily:"Nunito,sans-serif",fontSize:10.5,fontWeight:800,cursor:"pointer",flexShrink:0}}>Sair ⎋</button>
      </div>
    </aside>
    <main style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      <Topbar title={TITLES[pg]} de={de} ate={ate} setDe={setDe} setAte={setAte} rep={rep} setRep={setRep}/>
      <div style={{padding:"22px 24px",flex:1,overflowY:"auto"}}>
        {pg==="dashboard"&&<PageDash de={de} ate={ate}/>}
        {pg==="timeline"&&<PageTimeline/>}
        {pg==="representantes"&&<PageReps de={de} ate={ate}/>}
        {pg==="carteira"&&<PageCobertura/>}
        {pg==="eficiencia"&&<PageEficiencia/>}
        {pg==="comercial"&&<PageComercial/>}
        {pg==="precadastros"&&<PagePreCadastros/>}
        {pg==="pedidos"&&<PagePedidos de={de} ate={ate}/>}
      </div>
    </main>
  </div>;
}


function DashLogin({onOk}){
  var [email,setEmail]=useState("");
  var [pin,setPin]=useState("");
  var [erro,setErro]=useState("");
  var [carregando,setCarregando]=useState(false);
  function entrar(){
    if(!email.trim()||!pin.trim()){ setErro("Informe e-mail e PIN."); return; }
    setCarregando(true); setErro("");
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"autenticar",email:email.trim(),pin:pin.trim()})})
      .then(r=>r.json())
      .then(res=>{
        var d=res&&res.data;
        if(res.ok&&d&&d.autenticado){
          var u=d.usuario||{};
          if(String(u.tipo||"").toLowerCase()!=="gestao"){ setErro("Acesso restrito à gestão e backoffice."); setCarregando(false); return; }
          try{ localStorage.setItem("tera_dash_sessao",JSON.stringify(u)); }catch(e){}
          window.DASH_USER=u;
          onOk(u);
        } else { setErro((d&&d.msg)||"E-mail ou PIN incorretos."); setCarregando(false); }
      })
      .catch(()=>{ setErro("Sem conexão com o servidor. Tente novamente."); setCarregando(false); });
  }
  return <div style={{minHeight:"100vh",background:V,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Nunito Sans,sans-serif"}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{background:"#fff",borderRadius:14,padding:"16px 14px",boxShadow:"0 8px 26px rgba(0,0,0,.25)",borderBottom:`4px solid ${O}`,marginBottom:14}}>
        <img src={LOGO_TERA} alt="Tera" style={{width:"100%",maxWidth:200,display:"block",margin:"0 auto"}}/>
      </div>
      <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,.55)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:22}}>Painel de Gestão</div>
      <div style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:16,padding:"20px 18px"}}>
        <div style={{fontSize:10.5,fontWeight:800,color:"rgba(255,255,255,.6)",letterSpacing:".8px",textTransform:"uppercase",marginBottom:5}}>E-mail corporativo</div>
        <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="seu@teranv.com.br" style={{width:"100%",boxSizing:"border-box",padding:"12px 13px",borderRadius:10,border:"none",fontFamily:"Nunito Sans,sans-serif",fontSize:14,outline:"none",marginBottom:14}}/>
        <div style={{fontSize:10.5,fontWeight:800,color:"rgba(255,255,255,.6)",letterSpacing:".8px",textTransform:"uppercase",marginBottom:5}}>PIN de acesso</div>
        <input value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")entrar();}} type="password" inputMode="numeric" maxLength={4} placeholder="••••" style={{width:"100%",boxSizing:"border-box",padding:"12px 13px",borderRadius:10,border:"none",fontFamily:"Nunito Sans,sans-serif",fontSize:16,letterSpacing:"6px",outline:"none"}}/>
        {erro&&<div style={{background:"#FEE2E2",color:"#7F1D1D",borderRadius:8,padding:"9px 12px",fontSize:12,fontWeight:700,marginTop:12}}>⚠️ {erro}</div>}
        <button onClick={entrar} disabled={carregando} style={{width:"100%",marginTop:16,padding:"13px",background:carregando?"rgba(255,255,255,.35)":"#fff",color:V,border:"none",borderRadius:10,fontFamily:"Nunito,sans-serif",fontSize:14.5,fontWeight:900,cursor:carregando?"default":"pointer"}}>{carregando?"Verificando...":"Entrar →"}</button>
      </div>
      <div style={{textAlign:"center",marginTop:14,fontSize:10,color:"rgba(255,255,255,.35)"}}>🔒 Acesso restrito · Perfil gestão · Tera Nutrição Vegetal</div>
    </div>
  </div>;
}

function LoginGate(){
  var [user,setUser]=useState(function(){
    try{ var s=JSON.parse(localStorage.getItem("tera_dash_sessao")||"null"); if(s&&s.nome){ window.DASH_USER=s; return s; } }catch(e){}
    return null;
  });
  if(!user) return <DashLogin onOk={setUser}/>;
  return <App/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(LoginGate));

</script>
</body>
</html>
