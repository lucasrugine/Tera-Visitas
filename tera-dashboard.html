function calcDias(de,ate){if(!de||!ate)return 5;return Math.max(1,Math.round((new Date(ate)-new Date(de))/(864e5))+1);}
function fmtDt(d){return d?new Date(d).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"-";}
function parseVisitaDate(s){
  if(s==null||s==="") return null;
  if(s instanceof Date) return isNaN(s.getTime())?null:s;
  s=String(s).trim();
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3],12,0,0);
  var p=s.split("/");
  if(p.length>=3) return new Date(+p[2],+p[1]-1,+p[0],12,0,0);
  var d=new Date(s); return isNaN(d.getTime())?null:d;
}
function fmtVisitaData(s){var d=parseVisitaDate(s);return d?("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2):"-";}
function fmtVisitaHora(s){
  if(s==null||s==="") return "";
  if(/^\d{1,2}:\d{2}/.test(String(s))) return String(s).slice(0,5);
  var d=new Date(s); if(isNaN(d.getTime())) return String(s);
  return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});
}
function getData(de,ate){ return null; } // substituído por useApiData

function useApiData(de,ate,rep){
  var [data,setData]=useState(null);
  var [loading,setLoading]=useState(true);
  var [error,setError]=useState(null);
  var [visitas,setVisitas]=useState([]);

  useEffect(()=>{
    if(!de||!ate){ setLoading(false); return; }
    setLoading(true); setError(null);
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getVisitas",representante:rep||""})})
      .then(r=>r.json())
      .then(res=>{
        if(!res.ok) throw new Error(res.error||"Erro API");
        var rows=res.data||[];
        // Filtrar por período
        var deDt=new Date(de+"T00:00:00"), ateDt=new Date(ate+"T23:59:59");
        var filtradas=rows.filter(v=>{
          var dt=parseVisitaDate(v.Data);
          if(!dt) return false;
          return dt>=deDt && dt<=ateDt;
        });
        setVisitas(filtradas);

        // Calcular KPIs
        var hojeRef=new Date();
        var kpis={
          total:filtradas.length,
          hoje:filtradas.filter(v=>{var hd=parseVisitaDate(v.Data);return hd&&hd.getFullYear()===hojeRef.getFullYear()&&hd.getMonth()===hojeRef.getMonth()&&hd.getDate()===hojeRef.getDate();}).length,
          pres:filtradas.filter(v=>v.Tipo_Atendimento!=="Remoto").length,
          rem:filtradas.filter(v=>v.Tipo_Atendimento==="Remoto").length,
          valor:filtradas.reduce((a,v)=>a+(parseFloat(v["Valor_R$"])||0),0),
          fech:filtradas.filter(v=>v.Status_Negocio==="Venda realizada").length,
          prop:filtradas.filter(v=>v.Status_Negocio==="Em negociação").length,
          porTipo:{},
          porRep:{},
        };
        filtradas.forEach(v=>{
          var t=v.Tipo_Visita||"Outro";
          kpis.porTipo[t]=(kpis.porTipo[t]||0)+1;
          var r=v.Representante||"?";
          kpis.porRep[r]=(kpis.porRep[r]||0)+1;
        });
        setData(kpis);
        setLoading(false);
      })
      .catch(e=>{ setError(e.message); setLoading(false); });
  },[de,ate,rep]);

  return {data,loading,error,visitas};
}

function Donut({data,colors,size=150}){
  var entries=Object.entries(data),total=entries.reduce((a,[,v])=>a+v,0)||1;
  var angle=-Math.PI/2,r=size*.36,inner=size*.22,cx=size/2,cy=size/2;
  var slices=entries.map(([l,v],i)=>{
    var sw=v/total*2*Math.PI;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sw;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var lf=sw>Math.PI?1:0;
    var xi1=cx+inner*Math.cos(angle-sw),yi1=cy+inner*Math.sin(angle-sw);
    var xi2=cx+inner*Math.cos(angle),yi2=cy+inner*Math.sin(angle);
    return {l,v,c:colors[i%colors.length],x1,y1,x2,y2,xi1,yi1,xi2,yi2,lf};
  });
  return <div style={{display:"flex",alignItems:"center",gap:12}}>
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,flexShrink:0}}>
      {slices.map((s,i)=><path key={i} d={`M${s.x1} ${s.y1}A${r} ${r} 0 ${s.lf} 1 ${s.x2} ${s.y2}L${s.xi2} ${s.yi2}A${inner} ${inner} 0 ${s.lf} 0 ${s.xi1} ${s.yi1}Z`} fill={s.c} stroke="#fff" strokeWidth={2}/>)}
      <text x={cx} y={cy-4} textAnchor="middle" fontSize={18} fontWeight={900} fill={INK} fontFamily="Nunito,sans-serif">{total}</text>
      <text x={cx} y={cy+13} textAnchor="middle" fontSize={9} fill={INK4} fontFamily="Nunito Sans,sans-serif">visitas</text>
    </svg>
    <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
      {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:9,height:9,borderRadius:2,background:s.c,flexShrink:0}}/>
        <span style={{fontSize:10.5,flex:1,color:INK3,fontWeight:600}}>{s.l}</span>
        <span style={{fontSize:10,color:INK4,fontFamily:"JetBrains Mono,monospace",fontWeight:700}}>{s.v}</span>
      </div>)}
    </div>
  </div>;
}

function BarChart({data,colors,h=150}){
  var entries=Object.entries(data),max=Math.max(...entries.map(([,v])=>v),1),W=48;
  return <svg viewBox={`0 0 ${entries.length*W} ${h+28}`} style={{width:"100%",height:h+28}}>
    {entries.map(([l,v],i)=>{
      var bh=Math.round((v/max)*h),x=i*W+4,y=h-bh;
      return <g key={l}>
        <rect x={x} y={y} width={38} height={bh} rx={5} fill={colors[i%colors.length]}/>
        <text x={x+19} y={h+14} textAnchor="middle" fontSize={9} fill={INK4} fontFamily="Nunito Sans,sans-serif">{l.slice(0,8)}</text>
        {v>0&&<text x={x+19} y={y-4} textAnchor="middle" fontSize={9} fontWeight={700} fill={INK}>{v}</text>}
      </g>;
    })}
  </svg>;
}

        💡 Para exportar com dados reais em tempo real, conecte o dashboard ao Google Sheets.

}

        <div key={i} style={{...sh,position:"relative",overflow:"hidden"}}>

function PagePreCadastros(){
  var [lista,setLista]=useState([]);
  var [filtro,setFiltro]=useState("todos");
  var [busca,setBusca]=useState("");
  var [chatPc,setChatPc]=useState(null);
  var [msgsPc,setMsgsPc]=useState({});
  useEffect(()=>{
    fetch(API_URL,{method:"POST",body:JSON.stringify({action:"getPreCadastros"})})
      .then(r=>r.json()).then(res=>{ if(res.ok&&res.data) setLista(res.data||[]); }).catch(()=>{});
  },[]);;
  var [novaMsgPc,setNovaMsgPc]=useState("");
  var chatPcEndRef=useRef(null);
  useEffect(()=>{if(chatPcEndRef.current)chatPcEndRef.current.scrollIntoView({behavior:"smooth"});},[chatPc,msgsPc]);

  var pendentes=lista.filter(p=>p.status==="Pendente").length;
  var fil=lista.filter(p=>
    (filtro==="todos"||p.status===filtro)&&
    (!busca||p.nome.toLowerCase().includes(busca.toLowerCase())||p.representante.toLowerCase().includes(busca.toLowerCase())||p.cidade.toLowerCase().includes(busca.toLowerCase()))
  );

  function atualizarStatus(id,novoStatus){
    // Atualiza localmente
    setLista(l=>l.map(p=>p.id===id?{...p,status:novoStatus}:p));

    // Se marcando como cadastrado, mover para carteira via API
    if(novoStatus==="Cadastrado"){
      var pc=lista.find(p=>p.id===id);
      if(pc){
        // Chamar API para mover para aba Clientes
        fetch("https://script.google.com/macros/s/AKfycbzTPbl8CvTireGpFcVpeEkN3Jy6ttCzmrZRM1v5Qnq2pR2mWxEN_-CfV3bMvhrXww2q/exec",{
          method:"POST",
          body:JSON.stringify({
            action:"confirmarCadastro",
            id:pc.id,
            nome:pc.nome,
            cidade:pc.cidade,
            estado:pc.estado||"SP",
            telefone:pc.telefone||"",
            email:pc.email_cliente||"",
            documento:pc.documento||"",
            representante:pc.representante,
          })
        })
        .then(r=>r.json())
        .then(res=>{
          if(res.ok) alert("✅ Cliente '"+pc.nome+"' adicionado à carteira de "+pc.representante+" com sucesso!");
          else alert("⚠️ Erro ao mover para carteira: "+(res.error||"tente novamente"));
        })
        .catch(()=>alert("⚠️ Sem conexão com o servidor. Verifique e tente novamente."));
      }
    }

    // Atualizar status no Sheets via API
    fetch("https://script.google.com/macros/s/AKfycbzTPbl8CvTireGpFcVpeEkN3Jy6ttCzmrZRM1v5Qnq2pR2mWxEN_-CfV3bMvhrXww2q/exec",{
      method:"POST",
      body:JSON.stringify({action:"atualizarPreCadastro",id:id,status:novoStatus})
    }).catch(()=>{});
  }

  function enviarMsgPc(){
    if(!novaMsgPc.trim()||!chatPc) return;
    var nova={id:"m"+Date.now(),autor:"Lucas Rugine",tipo:"gestor",msg:novaMsgPc.trim(),hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})+"h",data:"Agora"};
    setMsgsPc(m=>({...m,[chatPc]:[...(m[chatPc]||[]),nova]}));
    setNovaMsgPc("");
    // Em produção: POST para API salvar no Sheets
  }

  var statusCor={
    "Pendente":{bg:"#FEE2E2",c:"#7F1D1D",dot:"#DC2626"},
    "Em análise":{bg:"#FEF3C7",c:"#78350F",dot:"#CA8A04"},
    "Cadastrado":{bg:"#DCFCE7",c:"#166534",dot:"#16A34A"},
    "Recusado":{bg:"#F3F4F6",c:"#4B5563",dot:"#9CA3AF"},
  };

  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      <KPI icon="🆕" val={pendentes} lbl="Pendentes" delta="Aguardando cadastro" ac="#DC2626" ib="#FEE2E2"/>
      <KPI icon="🔍" val={lista.filter(p=>p.status==="Em análise").length} lbl="Em análise" delta="Backoffice analisando" ac={O} ib={OP}/>
      <KPI icon="✅" val={lista.filter(p=>p.status==="Cadastrado").length} lbl="Cadastrados" delta="Concluídos" up ac={V} ib={VP}/>
      <KPI icon="👥" val={lista.length} lbl="Total recebidos" delta="Pré-cadastros" ac={B} ib={BP}/>
    </div>

    <div style={{...sh,marginBottom:20,padding:"16px 20px",background:"#FEF3C7",border:`1.5px solid #CA8A04`,borderLeft:`4px solid #CA8A04`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>📧</span>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#78350F",fontFamily:"Nunito,sans-serif"}}>Notificações automáticas ativas</div>
          <div style={{fontSize:11.5,color:"#92400E",marginTop:3,lineHeight:1.5}}>
            Quando um representante cria um pré-cadastro, os e-mails abaixo são notificados automaticamente:<br/>
            <strong>lucas.rugine@teranv.com.br · viviane.soldera@teraambiental.com.br · caroline.nascimento@teranv.com.br · pedro.amorim@teranv.com.br</strong>
          </div>
        </div>
      </div>
    </div>

    <Card title={`Pré-cadastros recebidos · ${fil.length} resultado(s)`}
      action={<div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar..." style={{padding:"6px 11px",border:`1.5px solid ${BRD}`,borderRadius:8,fontFamily:"Nunito Sans,sans-serif",fontSize:12,outline:"none",width:180}}/>
        <select value={filtro} onChange={e=>setFiltro(e.target.value)} style={{padding:"6px 11px",border:`1.5px solid ${BRD}`,borderRadius:8,fontFamily:"Nunito Sans,sans-serif",fontSize:12,outline:"none"}}>
          <option value="todos">Todos os status</option>
          <option value="Pendente">Pendente</option>
          <option value="Em análise">Em análise</option>
          <option value="Cadastrado">Cadastrado</option>
          <option value="Recusado">Recusado</option>
        </select>
      </div>}
    >
      {fil.length===0&&<div style={{textAlign:"center",padding:"32px",color:INK4,fontSize:13}}>
        <div style={{fontSize:32,marginBottom:8}}>🆕</div>
        Nenhum pré-cadastro encontrado.
      </div>}
      {fil.map((p,i)=>{
        var sc=statusCor[p.status]||statusCor["Pendente"];
        return <div key={p.id} style={{padding:"16px 0",borderBottom:i<fil.length-1?`1px solid ${BRD}`:"none"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:800}}>{p.nome}</div>
                <span style={{background:sc.bg,color:sc.c,fontSize:9.5,fontWeight:800,padding:"2px 9px",borderRadius:20,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                  {p.status}
                </span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
                {[["📍 Localização",`${p.cidade} · ${p.estado}`],["👤 Representante",p.representante],["📅 Data",`${p.data} · ${p.hora}`],["📞 Telefone",p.telefone||"—"],["📧 E-mail",p.email_cliente||"—"],["📄 Doc.",p.documento||"—"],["💰 Potencial",p.potencial||"—"],["🆔 ID",p.id]].map(([l,v])=>(
                  <div key={l} style={{background:BG,borderRadius:8,padding:"8px 10px"}}>
                    <div style={{fontSize:9.5,fontWeight:700,color:INK4,marginBottom:3}}>{l}</div>
                    <div style={{fontSize:12,fontWeight:600,color:INK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {p.status==="Pendente"&&<button onClick={()=>atualizarStatus(p.id,"Em análise")} style={{padding:"7px 14px",background:O,color:"#fff",border:"none",borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>🔍 Iniciar análise</button>}
            {(p.status==="Pendente"||p.status==="Em análise")&&<button onClick={()=>atualizarStatus(p.id,"Cadastrado")} style={{padding:"7px 14px",background:V,color:"#fff",border:"none",borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>✅ Marcar como cadastrado</button>}
            {p.status!=="Recusado"&&p.status!=="Cadastrado"&&<button onClick={()=>atualizarStatus(p.id,"Recusado")} style={{padding:"7px 14px",background:"#F3F4F6",color:"#4B5563",border:`1px solid ${BRD}`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>✕ Recusar</button>}
            {p.telefone&&<a href={`https://wa.me/55${p.telefone.replace(/[^0-9]/g,"")}`} target="_blank" rel="noreferrer" style={{padding:"7px 14px",background:"#25D366",color:"#fff",border:"none",borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer",textDecoration:"none",display:"inline-block"}}>📱 WhatsApp</a>}
            <button onClick={()=>setChatPc(chatPc===p.id?null:p.id)} style={{padding:"7px 14px",background:chatPc===p.id?"#1D4ED8":BP,color:chatPc===p.id?"#fff":B,border:`1.5px solid ${chatPc===p.id?"#1D4ED8":B}`,borderRadius:20,fontFamily:"Nunito,sans-serif",fontSize:11,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
              💬 Chat {(msgsPc[p.id]||[]).length>0&&<span style={{background:chatPc===p.id?"rgba(255,255,255,.3)":B,color:"#fff",fontSize:9,padding:"1px 6px",borderRadius:20,fontWeight:800}}>{(msgsPc[p.id]||[]).length}</span>}
            </button>
          </div>

          {/* CHAT DO PRÉ-CADASTRO */}
          {chatPc===p.id&&<div style={{marginTop:14,border:`1.5px solid ${B}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{background:B,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontFamily:"Nunito,sans-serif",fontSize:12,fontWeight:800,color:"#fff",display:"flex",alignItems:"center",gap:7}}>
                💬 Chat · {p.nome}
                <span style={{fontSize:10,background:"rgba(255,255,255,.2)",padding:"1px 8px",borderRadius:20}}>Backoffice ↔ Representante</span>
              </div>
              <button onClick={()=>setChatPc(null)} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            <div style={{maxHeight:240,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8,background:"#F8FBFF"}}>
              {(msgsPc[p.id]||[]).length===0&&<div style={{textAlign:"center",padding:"24px 0",color:INK4,fontSize:12}}>
                <div style={{fontSize:24,marginBottom:6}}>💬</div>
                Nenhuma mensagem ainda. Use o chat para solicitar informações ao representante.
              </div>}
              {(msgsPc[p.id]||[]).map((m,mi)=>{
                var ig=m.tipo==="gestor"||m.tipo==="backoffice";
                return <div key={mi} style={{display:"flex",flexDirection:"column",alignItems:ig?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"80%",padding:"8px 12px",borderRadius:ig?"12px 12px 2px 12px":"12px 12px 12px 2px",background:ig?B:"#fff",color:ig?"#fff":INK,fontSize:12,lineHeight:1.55,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>{m.msg}</div>
                  <div style={{fontSize:9,color:INK4,marginTop:2,display:"flex",gap:4}}>
                    <span style={{fontWeight:700}}>{m.autor.split(" ")[0]}</span>
                    <span>·</span><span>{m.data} {m.hora}</span>
                  </div>
                </div>;
              })}
              <div ref={chatPcEndRef}/>
            </div>
            <div style={{padding:"8px 12px",borderTop:`1px solid #DBEAFE`,background:"#fff",display:"flex",gap:8,alignItems:"flex-end"}}>
              <textarea value={novaMsgPc} onChange={e=>setNovaMsgPc(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviarMsgPc();}}}
                placeholder="Solicitar informação ao representante... (Enter = enviar)" rows={2}
                style={{flex:1,padding:"8px 12px",border:`1.5px solid #BFDBFE`,borderRadius:8,fontFamily:"Nunito Sans,sans-serif",fontSize:12.5,outline:"none",resize:"none",lineHeight:1.5}}/>
              <button onClick={enviarMsgPc} disabled={!novaMsgPc.trim()} style={{padding:"8px 14px",background:novaMsgPc.trim()?B:"#E0E0E0",color:"#fff",border:"none",borderRadius:8,fontFamily:"Nunito,sans-serif",fontSize:12,fontWeight:800,cursor:novaMsgPc.trim()?"pointer":"default"}}>Enviar ↑</button>
            </div>
            <div style={{padding:"8px 14px",background:"#EFF6FF",borderTop:`1px solid #DBEAFE`,fontSize:10.5,color:"#1E40AF"}}>
              📱 O representante <strong>{p.representante.split(" ")[0]}</strong> receberá uma notificação no app ao receber sua mensagem.
            </div>
          </div>}
        </div>;
      })}
    </Card>
  </div>;
}

var RepCtx=createContext("");
function App(){
  var [pg,setPg]=useState("dashboard");
  var [rep,setRep]=useState("");
  var hoje=new Date().toISOString().slice(0,10);
  var d7=new Date();d7.setDate(d7.getDate()-6);
  var [de,setDe]=useState(d7.toISOString().slice(0,10));
  var [ate,setAte]=useState(hoje);
  var MENUS=[{id:"dashboard",ico:"📊",l:"Dashboard"},{id:"timeline",ico:"🗓",l:"Timeline"},{id:"representantes",ico:"👥",l:"Representantes"},{id:"carteira",ico:"🏢",l:"Cobertura"},{id:"comercial",ico:"💰",l:"Comercial"},{id:"precadastros",ico:"🆕",l:"Pré-Cadastros",badge:PRE_CADASTROS_DEMO.filter(p=>p.status==="Pendente").length}];
  var TITLES={dashboard:"Dashboard Geral",timeline:"Timeline de Visitas",representantes:"Representantes",carteira:"Cobertura da Carteira",comercial:"Painel Comercial",precadastros:"Pré-Cadastros de Clientes"};

  return <div style={{display:"flex",minHeight:"100vh",fontFamily:"Nunito Sans,sans-serif",background:BG}}>
    <aside style={{width:220,background:V,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"20px 16px 16px",borderBottom:"1px solid rgba(255,255,255,.1)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,background:"rgba(255,255,255,.15)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🌿</div>
          <div style={{fontFamily:"Nunito,sans-serif",fontSize:16,fontWeight:900,color:"#fff",letterSpacing:".5px"}}>TERA</div>
        </div>
        <div style={{fontSize:9,color:"rgba(255,255,255,.4)",letterSpacing:"1.5px",textTransform:"uppercase",marginTop:6,paddingLeft:41}}>Painel de Gestão</div>
      </div>
      <nav style={{flex:1,padding:"12px 8px"}}>
        <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,.35)",letterSpacing:"1.5px",textTransform:"uppercase",padding:"12px 10px 7px"}}>Principal</div>
        {MENUS.map(m=><div key={m.id} onClick={()=>setPg(m.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:9,cursor:"pointer",background:pg===m.id?"rgba(255,255,255,.18)":"transparent",color:pg===m.id?"#fff":"rgba(255,255,255,.65)",fontSize:12.5,fontWeight:600,marginBottom:1,transition:"all .15s"}}>
          <span style={{fontSize:15}}>{m.ico}</span>{m.l}
          {m.id==="timeline"&&<span style={{marginLeft:"auto",background:O,color:"#fff",fontSize:9.5,fontWeight:800,padding:"1px 7px",borderRadius:20}}>6</span>}
          {m.badge>0&&m.id!=="timeline"&&<span style={{marginLeft:"auto",background:"#DC2626",color:"#fff",fontSize:9.5,fontWeight:800,padding:"1px 7px",borderRadius:20}}>{m.badge}</span>}
        </div>)}
        <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,.35)",letterSpacing:"1.5px",textTransform:"uppercase",padding:"12px 10px 7px"}}>Dados</div>
        <div onClick={()=>window.open("https://docs.google.com/spreadsheets/d/182w1l7GfbfVUEahkQ8kYMh8IDcb807qUNuV10te36lY")} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:9,cursor:"pointer",color:"rgba(255,255,255,.65)",fontSize:12.5,fontWeight:600}}>
          <span style={{fontSize:15}}>📋</span>Planilha Google
        </div>
      </nav>
      <div style={{padding:14,borderTop:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.2)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>LR</div>
        <div><div style={{fontSize:11.5,fontWeight:700,color:"#fff"}}>Lucas Rugine</div><div style={{fontSize:9.5,color:"rgba(255,255,255,.45)"}}>Gestor · Tera NV</div></div>
      </div>
    </aside>
    <main style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      <Topbar title={TITLES[pg]} de={de} ate={ate} setDe={setDe} setAte={setAte} rep={rep} setRep={setRep}/>
      <div style={{padding:"22px 24px",flex:1,overflowY:"auto"}}>
        {pg==="dashboard"&&<PageDash de={de} ate={ate}/>}
        {pg==="timeline"&&<PageTimeline/>}
        {pg==="representantes"&&<PageReps de={de} ate={ate}/>}
        {pg==="carteira"&&<PageCobertura/>}
        {pg==="comercial"&&<PageComercial/>}
        {pg==="precadastros"&&<PagePreCadastros/>}
      </div>
    </main>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
